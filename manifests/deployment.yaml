apiVersion: apps/v1
kind: Deployment
metadata:
  name: bank-app
  labels:
    app: bank-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: bank-app
  template:
    metadata:
      labels:
        app: bank-app
    spec:
      containers:
      - name: bank-app
        image: bank-app:latest
        ports:
        - containerPort: 8080
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "openshift"
---
apiVersion: v1
kind: Service
metadata:
  name: bank-app-service
spec:
  selector:
    app: bank-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: ClusterIP
